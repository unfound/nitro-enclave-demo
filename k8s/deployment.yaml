apiVersion: apps/v1
kind: Deployment
metadata:
  name: tpm-app-demo
  labels:
    app: tpm-app-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tpm-app-demo
  template:
    metadata:
      labels:
        app: tpm-app-demo
    spec:
      containers:
        # 轻量级模型服务（Alpine + llama.cpp server）
        - name: llm
          image: tpm-app-llm:latest
          ports:
            - containerPort: 8080
              name: llm-api
          resources:
            requests:
              cpu: "2"
              memory: "1.5Gi"
            limits:
              cpu: "4"
              memory: "3Gi"

        # Next.js 应用
        - name: app
          image: tpm-app-app:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: ENCLAVE_MODE
              value: "false"
            - name: USE_MOCK_LLM
              value: "false"
            - name: LLM_BASE_URL
              value: "http://localhost:8080/v1"
            - name: LLM_MODEL
              value: "qwen3.5"
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/attestation
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/attestation
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tpm-app-demo
spec:
  selector:
    app: tpm-app-demo
  ports:
    - port: 80
      targetPort: 3000
      name: http
  type: ClusterIP
