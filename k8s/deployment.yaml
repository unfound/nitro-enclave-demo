apiVersion: apps/v1
kind: Deployment
metadata:
  name: nitro-enclave-demo
  labels:
    app: nitro-enclave-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nitro-enclave-demo
  template:
    metadata:
      labels:
        app: nitro-enclave-demo
    spec:
      containers:
        # Ollama 模型服务（模型已打包在镜像内）
        - name: ollama
          image: nitro-enclave-ollama:latest
          ports:
            - containerPort: 11434
              name: ollama-api
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"

        # Next.js 应用
        - name: app
          image: nitro-enclave-app:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: ENCLAVE_MODE
              value: "false"
            - name: USE_MOCK_LLM
              value: "false"
            - name: LLM_BASE_URL
              value: "http://localhost:11434/v1"
            - name: LLM_MODEL
              value: "qwen3.5"
            # 可选：自定义系统提示词
            # - name: SYSTEM_PROMPT
            #   value: "你是一位专业的运动健康咨询助手..."
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/attestation
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/attestation
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nitro-enclave-demo
spec:
  selector:
    app: nitro-enclave-demo
  ports:
    - port: 80
      targetPort: 3000
      name: http
  type: ClusterIP
