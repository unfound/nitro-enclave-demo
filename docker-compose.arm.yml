services:
  # ── LLM ──────────────────────────────────────────────────────────────
  llm:
    image: tpm-llm:arm64
    container_name: tpm-app-llm
    shm_size: "2g"
    restart: unless-stopped

  # ── Backend ──────────────────────────────────────────────────────────
  backend:
    image: tpm-backend:arm64
    container_name: tpm-app-backend
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      USE_MOCK_TPM: "true"
      PCR_INDICES: "1,4"
      PCR_GOLDEN_BASELINE: "1:sha256:mock_pcr1_value_for_demo;4:sha256:mock_pcr4_value_for_demo"
      LLM_BASE_URL: http://llm:8080/v1/chat/completions
      LLM_MODEL: qwen3.5
      USE_MOCK_LLM: "false"
    depends_on:
      - llm
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────
  frontend:
    image: tpm-frontend:arm64
    container_name: tpm-app-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
      # 黄金基准线（Next.js 服务端运行时读取，前端独立校验用）
      PCR_GOLDEN_BASELINE: "1:sha256:mock_pcr1_value_for_demo,4:sha256:mock_pcr4_value_for_demo"
    depends_on:
      - backend
    restart: unless-stopped
