services:
  # 轻量级模型服务（Alpine + llama.cpp server，基础镜像仅 8.8MB）
  llm:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: nitro-enclave-llm
    shm_size: "2g"
    # 如需外部调试，取消下面注释:
    # ports:
    #   - "8080:8080"
    restart: unless-stopped

  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nitro-enclave-app
    ports:
      - "3000:3000"
    environment:
      USE_MOCK_LLM: "false"
      ENCLAVE_MODE: "true"
      LLM_BASE_URL: "http://llm:8080/v1"
      LLM_MODEL: "qwen3.5"
      SYSTEM_PROMPT: "你是一位专业的运动健康助手，擅长回答运动健康相关的问题，回答尽量简洁易懂。"
    depends_on:
      - llm
    restart: unless-stopped
